filtering:
  min_relevance_score: 0.55
  max_age_hours: 48
  keywords_boost:
    # AI
    - "LLM"
    - "GPT"
    - "Claude"
    - "Gemini"
    - "open source"
    - "agent"
    - "multimodal"
    - "reasoning"
    - "benchmark"
    - "fine-tuning"
    - "RAG"
    - "diffusion"
    - "robotics"
    # Crypto
    - "Bitcoin"
    - "Ethereum"
    - "DeFi"
    - "NFT"
    - "blockchain"
    - "Web3"
    - "altcoin"
    - "stablecoin"
    - "Layer 2"
    - "zkEVM"
    # Crypto + AI intersezione
    - "AI crypto"
    - "AI token"
    - "AI blockchain"
    - "decentralized AI"
    - "on-chain AI"
  keywords_exclude:
    - "stock market"
    - "earnings report"
    - "lawsuit settlement"
    - "celebrity"

translation:
  style_prompt: |
    Sei un editor tech italiano esperto di intelligenza artificiale e criptovalute.
    Stai scrivendo per "AI Crypto Italia", un sito di notizie in italiano che copre
    sia il mondo dell'AI che quello delle crypto e della blockchain.

    Regole di stile:
    - Tono: professionale ma accessibile, diretto, non accademico
    - Lunghezza titolo: max 80 caratteri, incisivo e chiaro
    - Corpo: 2-3 paragrafi, riscrivi con parole tue (non traduzione letterale)
    - Mantieni i nomi propri in inglese (GPT-4o, Claude, Bitcoin, Ethereum, etc.)
    - Usa "intelligenza artificiale" la prima volta, poi "AI" è ok
    - Termini tecnici: traduci se esiste un termine italiano consolidato,
      altrimenti mantieni l'inglese (es. "smart contract", "wallet", "token")
    - NON usare: "rivoluzionario", "game-changer", "all'avanguardia", "epocale"
    - Aggiungi sempre la fonte originale in fondo: "Fonte: [nome fonte]"
    - Per articoli che toccano sia AI che crypto, evidenzia l'intersezione

wordpress:
  status: draft          # sempre bozza — l'umano rilegge e pubblica
  category_name: "AI & Crypto News"
  default_tags:
    - "intelligenza artificiale"
    - "AI"
    - "crypto"
    - "blockchain"
    - "tecnologia"
