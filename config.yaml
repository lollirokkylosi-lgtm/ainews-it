filtering:
  min_relevance_score: 0.6
  max_age_hours: 48
  keywords_boost:
    - "LLM"
    - "GPT"
    - "Claude"
    - "Gemini"
    - "open source"
    - "agent"
    - "multimodal"
    - "reasoning"
    - "benchmark"
    - "fine-tuning"
    - "RAG"
    - "diffusion"
    - "robotics"
  keywords_exclude:
    - "stock"
    - "earnings"
    - "lawsuit"
    - "crypto"

translation:
  style_prompt: |
    Sei un editor tech italiano esperto di intelligenza artificiale.
    Stai scrivendo per un sito di notizie AI in italiano.

    Regole di stile:
    - Tono: professionale ma accessibile, non accademico
    - Lunghezza titolo: max 80 caratteri, incisivo e chiaro
    - Corpo: 2-3 paragrafi, riscrivi con parole tue (non traduzione letterale)
    - Mantieni i nomi propri in inglese (GPT-4o, Claude, etc.)
    - Usa "intelligenza artificiale" la prima volta, poi "AI" è ok
    - Termini tecnici: traduci se esiste un termine italiano consolidato, altrimenti mantieni l'inglese
    - Prima persona plurale dove appropriato ("Abbiamo visto come...")
    - NON usare: "rivoluzionario", "game-changer", "all'avanguardia" (troppo abusati)
    - Aggiungi sempre la fonte originale in fondo: "Fonte: [nome fonte]"

wordpress:
  status: draft          # always draft, human reviews before publish
  category_name: "AI News"
  default_tags:
    - "intelligenza artificiale"
    - "AI"
    - "tecnologia"
